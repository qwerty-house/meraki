<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERAKI - Hormone Assessment</title>
    <script src="https://unpkg.com/react@18/umd/react.development.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.development.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background-color: #FDFBF7;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #A51D24;
            cursor: pointer;
        }
        .animate-in {
            animation: fadeIn 0.7s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
    </style>
</head>
<body>
    <div id="root"></div>
    <script type="text/babel">
        window.addEventListener('DOMContentLoaded', () => {
            const { useState, useEffect, useRef } = React;

            const Icon = ({ name, className = "w-6 h-6", color = "currentColor", fill = "none" }) => {
                const containerRef = useRef(null);
                useEffect(() => {
                    if (window.lucide && containerRef.current) {
                        containerRef.current.innerHTML = `<i data-lucide="${name.replace(/[A-Z]/g, m => "-" + m.toLowerCase()).replace(/^-/, '')}" class="${className}" style="color: ${color}; fill: ${fill}"></i>`;
                        window.lucide.createIcons({
                            attrs: { class: className },
                            nameAttr: 'data-lucide',
                            icons: window.lucide.icons
                        });
                    }
                }, [name, className, color, fill]);
                return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
            };

            const App = () => {
                const [step, setStep] = useState(0); 
                const [answers, setAnswers] = useState({
                    nickname: '',
                    goal: [],
                    regularity: '',
                    medical: [],
                    allergies: [], 
                    allergyType: 'acute',
                    pregnancy: '',
                    birthControl: '',
                    seriousness: 5,
                    contactInfo: { phone: '', timeSlot: '' }
                });

                const nextStep = () => setStep(prev => prev + 1);
                const prevStep = () => setStep(prev => prev - 1);

                const resetQuiz = () => {
                    setStep(0);
                    setAnswers({
                        nickname: '',
                        goal: [],
                        regularity: '',
                        medical: [],
                        allergies: [],
                        allergyType: 'acute',
                        pregnancy: '',
                        birthControl: '',
                        seriousness: 5,
                        contactInfo: { phone: '', timeSlot: '' }
                    });
                };

                const toggleGoal = (id) => {
                    setAnswers(prev => {
                        const newGoal = prev.goal.includes(id) 
                            ? prev.goal.filter(g => g !== id) 
                            : [...prev.goal, id];
                        return { ...prev, goal: newGoal };
                    });
                };

                const toggleMedical = (id) => {
                    setAnswers(prev => {
                        let newMedical = [...prev.medical];
                        if (id === 'none') {
                            newMedical = ['none'];
                        } else {
                            newMedical = newMedical.filter(item => item !== 'none');
                            if (newMedical.includes(id)) {
                                newMedical = newMedical.filter(item => item !== id);
                            } else {
                                newMedical.push(id);
                            }
                        }
                        return { ...prev, medical: newMedical };
                    });
                };

                const toggleAllergy = (id) => {
                    setAnswers(prev => {
                        let newAllergies = [...prev.allergies];
                        if (id === 'none') {
                            newAllergies = ['none'];
                        } else {
                            newAllergies = newAllergies.filter(item => item !== 'none');
                            if (newAllergies.includes(id)) {
                                newAllergies = newAllergies.filter(item => item !== id);
                            } else {
                                newAllergies.push(id);
                            }
                        }
                        return { ...prev, allergies: newAllergies };
                    });
                };

                const handleSelect = (field, value) => {
                    setAnswers(prev => ({ ...prev, [field]: value }));
                    nextStep();
                };

                const isPhoneValid = (phone) => /^\d{10}$/.test(phone);

                const getResult = () => {
                    const { goal, regularity, medical, pregnancy, birthControl, allergies, allergyType } = answers;
                    const coreSeeds = ['flax', 'pumpkin', 'sesame', 'sunflower'];
                    const hasCoreAllergy = allergies.some(a => coreSeeds.includes(a));
                    
                    if (hasCoreAllergy && allergyType === 'acute') return 'ALLERGY_FORBIDDEN';
                    if (medical.includes('endo') || medical.includes('cysts') || medical.includes('fibroids')) return 'ENDO_SPECIAL';
                    if (regularity === 'irregular' || goal.includes('pcos') || goal.includes('weight_loss')) return 'PCOS_MOON';
                    if (goal.includes('pregnancy')) return 'PREP_PREGNANCY';
                    if (birthControl !== 'none') return 'BIRTH_CONTROL_BRIDGE';
                    return 'STANDARD_PMS';
                };

                const submitToGoogleSheets = async () => {
                    const SCRIPT_URL = "https://script.google.com/macros/s/AKfycbxvi7MnuyBqt7JkkrfAQJWVwgy-H9hsT0GlmH3IGFgVsK4Uwjx0zfzmOMCFtpJMrKyUdg/exec";
                    const payload = {
                        timestamp: new Date().toLocaleString('th-TH'),
                        nickname: answers.nickname,
                        goals: answers.goal.join(', '),
                        regularity: answers.regularity,
                        medical_conditions: answers.medical.join(', '),
                        allergies: answers.allergies.join(', '),
                        allergy_type: answers.allergyType,
                        is_pregnant: answers.pregnancy,
                        birth_control: answers.birthControl,
                        seriousness_score: answers.seriousness,
                        phone: answers.contactInfo.phone,
                        preferred_time: answers.contactInfo.timeSlot,
                        calculated_result: getResult()
                    };

                    try {
                        await fetch(SCRIPT_URL, {
                            method: "POST",
                            mode: "no-cors", 
                            headers: { "Content-Type": "text/plain" },
                            body: JSON.stringify(payload)
                        });
                    } catch (e) {
                        console.error("Submission error:", e);
                    }
                };

                const handleFinalSubmit = async () => {
                    await submitToGoogleSheets(); 
                    nextStep();
                };

                const resultKey = getResult();

                const ResultDisplay = () => {
                    const results = {
                        ALLERGY_FORBIDDEN: {
                            title: "โอบกอดความปลอดภัยก่อนนะคะ ⚠️",
                            description: "แอดมินตรวจเช็กแล้ว พบว่าคุณลูกค้ามีอาการ **แพ้เมล็ดพืชหลักแบบเฉียบพลัน** ซึ่งความปลอดภัยสำคัญที่สุดสำหรับ Meraki ค่ะ",
                            color: "text-rose-700",
                            bg: "bg-rose-50",
                            hideCTA: true
                        },
                        ENDO_SPECIAL: {
                            title: "สูตรพิเศษเพื่อมดลูกที่เบาสบาย 🌸",
                            description: "สำหรับกลุ่ม Endo/Cyst เราเน้นการลดอักเสบและปรับ Estrogen ที่เด่นเกินไปให้สมดุลค่ะ",
                            instruction: "ทานเฉพาะ **ถุง 2 (งา+ทานตะวัน)** ตลอดทั้งรอบ 28 วัน พร้อมงดนมวัวและของทอดเพื่อผลลัพธ์ที่ดีที่สุดค่ะ",
                            package: "Set B (2+2) For Endo Care",
                            image: "Set B.jpg",
                            price: "1,790.-",
                            copyMsg: "สนใจ Set B (2+2) ค่ะ ประเมินแล้วเป็นกลุ่ม Endo/Cyst"
                        },
                        PCOS_MOON: {
                            title: "ปรับจังหวะตามรอบพระจันทร์ 🌙",
                            description: "เราจะใช้จังหวะ **New Moon** เป็นตัวกำหนดให้ฮอร์โมนเริ่มทำงานใหม่ เพื่อให้การตกไข่กลับมาสม่ำเสมอค่ะ",
                            instruction: "เริ่ม ถุง 1 ในวัน New Moon 14 วัน และสลับ ถุง 2 อีก 14 วัน ต่อเนื่องอย่างน้อย 6 เดือนค่ะ",
                            package: "Set A (1+2) 6-Month Bundle",
                            image: "Set A.jpg",
                            price: "1,790.-",
                            copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วอยู่ในกลุ่ม PCOS/ลดน้ำหนักยาก"
                        },
                        PREP_PREGNANCY: {
                            title: "เตรียมบ้านที่อุ่นและสมบูรณ์ที่สุด 👶🏻",
                            description: "เน้นบำรุงคุณภาพไข่และผนังมดลูกให้นุ่มอุ่น พร้อมสำหรับการฝังตัวของเบบี๋ค่ะ",
                            instruction: "ทานสลับ ถุง 1&2 อย่างละ 14 วัน เริ่มวันแรกที่ประจำเดือนมา เพื่อสารอาหารที่จำเป็นต่อการเตรียมตั้งครรภ์ค่ะ",
                            package: "Set A (1+2) Prep Pregnancy",
                            image: "Set A.jpg",
                            price: "1,790.-",
                            copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วเตรียมพร้อมมีเบบี๋"
                        },
                        BIRTH_CONTROL_BRIDGE: {
                            title: "สะพานเชื่อมสู่ฮอร์โมนธรรมชาติ 🌿",
                            description: "ในช่วงเปลี่ยนผ่านจากรับมาเป็นสร้างฮอร์โมนเอง ร่างกายต้องการเวลาขับฮอร์โมนสังเคราะห์ ฟื้นฟู และเสริมสารอาหารอย่างเต็มที่",
                            instruction: "ทานควบคู่ยาคุมได้ทันที และทานต่อเนื่องหลังหยุดยาเพื่อประคองสมดุลไม่ให้ฮอร์โมนเหวี่ยงค่ะ",
                            package: "Set A (1+2) Monthly Balance",
                            image: "Set A.jpg",
                            price: "1,790.-",
                            copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วอยู่ในกลุ่มใช้ยาคุม/หยุดยา"
                        },
                        STANDARD_PMS: {
                            title: "ให้ทุกวันเป็นวันที่สดใส สบายใจ ✨",
                            description: "บอกลางอแง สิวบุก และอารมณ์เหวี่ยง... ให้ธรรมชาติช่วยประคองฮอร์โมนให้นิ่งสงบนะคะ",
                            instruction: "ทานสลับ ถุง 1&2 ตามรอบเดือนปกติ ทานต่อเนื่อง 3 เดือนเพื่อผลลัพธ์ที่ยั่งยืนค่ะ",
                            package: "Set A (1+2) Monthly Balance",
                            image: "Set A.jpg",
                            price: "1,790.-",
                            copyMsg: "สนใจ Set A (1+2) ค่ะ อยากลดอาการ PMS ทั่วไป"
                        }
                    };

                    const res = results[resultKey];
                    
                    return (
                        <div className="p-7 rounded-[2.5rem] bg-[#FDFBF7] border border-red-100">
                            <h2 className="text-2xl font-bold text-[#A51D24] mb-6">{res.title}</h2>
                            <p className="text-gray-700 mb-8">{res.description}</p>
                            {!res.hideCTA && (
                                <button onClick={() => window.open(`https://line.me/ti/p/@meraki?text=${encodeURIComponent('สวัสดีค่ะ ผลประเมินคือ: ' + res.copyMsg)}`)} className="w-full bg-[#A51D24] text-white font-bold py-6 rounded-full shadow-2xl">
                                    รับเซตแนะนำ (ดูแลพิเศษ) 🌟
                                </button>
                            )}
                        </div>
                    );
                };

                return (
                    <div className="min-h-screen flex flex-col items-center p-6">
                        {step === 0 && (
                            <div className="space-y-4">
                                <h1 className="text-4xl font-bold">สวัสดีค่ะ SIS</h1>
                                <input className="w-full p-5 rounded-3xl bg-gray-50 border" placeholder="ชื่อเล่นของคุณ..." value={answers.nickname} onChange={(e) => setAnswers({...answers, nickname: e.target.value})} />
                                <button onClick={nextStep} className="w-full bg-[#A51D24] text-white py-6 rounded-full font-bold">เริ่มต้น</button>
                            </div>
                        )}
                        {step > 0 && step < 8 && <div className="text-xs text-gray-400">Step {step}/7</div>}
                        {step === 8 && <ResultDisplay />}
                    </div>
                );
            };

            const root = ReactDOM.createRoot(document.getElementById('root'));
            root.render(<App />);
        });
    </script>
</body>
</html>
