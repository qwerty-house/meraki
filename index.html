<!DOCTYPE html>
<html lang="th">
<head>
    <meta charset="UTF-8">
    <meta name="viewport" content="width=device-width, initial-scale=1.0">
    <title>MERAKI - Hormone Assessment</title>
    <!-- Dependencies -->
    <script src="https://unpkg.com/react@18/umd/react.production.min.js"></script>
    <script src="https://unpkg.com/react-dom@18/umd/react-dom.production.min.js"></script>
    <script src="https://unpkg.com/@babel/standalone/babel.min.js"></script>
    <script src="https://cdn.tailwindcss.com"></script>
    <script src="https://unpkg.com/lucide@latest"></script>
    <link href="https://fonts.googleapis.com/css2?family=IBM+Plex+Sans+Thai:wght@300;400;500;600;700&display=swap" rel="stylesheet">
    <style>
        body {
            font-family: 'IBM Plex Sans Thai', sans-serif;
            background-color: #FDFBF7;
            color: #2D2D2D;
            margin: 0;
            padding: 0;
            overflow-x: hidden;
        }
        input[type=range]::-webkit-slider-thumb {
            -webkit-appearance: none;
            height: 24px;
            width: 24px;
            border-radius: 50%;
            background: #A51D24;
            cursor: pointer;
            box-shadow: 0 0 10px rgba(165, 29, 36, 0.2);
        }
        .animate-in {
            animation: fadeIn 0.7s ease-out forwards;
        }
        @keyframes fadeIn {
            from { opacity: 0; transform: translateY(10px); }
            to { opacity: 1; transform: translateY(0); }
        }
        .app-container {
            width: 100%;
            max-width: 100%;
        }
        @media (min-width: 640px) {
            .app-container {
                max-width: 450px;
            }
        }
    </style>
</head>
<body>
    <div id="root"></div>

    <script type="text/babel">
        const { useState, useEffect, useRef } = React;

        const GOAL_LABELS = {
            pms: 'ปวดท้องเมนส์/สิว/อารมณ์เหวี่ยง',
            pcos: 'PCOS/เมนส์มาไม่ปกติ',
            weight_loss: 'ลดน้ำหนักยาก/บวมน้ำ',
            pregnancy: 'เตรียมมีเบบี๋/บำรุงไข่',
            menopause: 'วัยทอง/ร้อนวูบวาบ',
            general: 'ดูแลสุขภาพและสมดุลทั่วไป'
        };

        const Icon = ({ name, className = "w-6 h-6", color = "currentColor", fill = "none" }) => {
            const containerRef = useRef(null);

            useEffect(() => {
                if (window.lucide && containerRef.current) {
                    const lucideName = name.replace(/[A-Z]/g, m => "-" + m.toLowerCase()).replace(/^-/, '');
                    containerRef.current.innerHTML = `<i data-lucide="${lucideName}" class="${className}" style="color: ${color}; fill: ${fill}"></i>`;
                    window.lucide.createIcons();
                }
            }, [name, className, color, fill]);

            return <span ref={containerRef} className="inline-flex items-center justify-center"></span>;
        };

        const App = () => {
            const [step, setStep] = useState(0); 
            const [answers, setAnswers] = useState({
                nickname: '',
                goal: [],
                regularity: '',
                medical: [],
                allergies: [], 
                allergyType: 'acute',
                pregnancy: '',
                birthControl: '',
                seriousness: 5,
                contactInfo: { phone: '', timeSlot: '' }
            });

            const nextStep = () => setStep(prev => prev + 1);
            const prevStep = () => setStep(prev => prev - 1);

            const resetQuiz = () => {
                setStep(0);
                setAnswers({
                    nickname: '', goal: [], regularity: '', medical: [], allergies: [], 
                    allergyType: 'acute', pregnancy: '', birthControl: '', seriousness: 5,
                    contactInfo: { phone: '', timeSlot: '' }
                });
            };

            const toggleGoal = (id) => {
                setAnswers(prev => ({
                    ...prev,
                    goal: prev.goal.includes(id) ? prev.goal.filter(g => g !== id) : [...prev.goal, id]
                }));
            };

            const toggleMedical = (id) => {
                setAnswers(prev => {
                    let newMedical = id === 'none' ? ['none'] : prev.medical.filter(item => item !== 'none');
                    if (id !== 'none') {
                        newMedical = newMedical.includes(id) ? newMedical.filter(item => item !== id) : [...newMedical, id];
                    }
                    return { ...prev, medical: newMedical };
                });
            };

            const toggleAllergy = (id) => {
                setAnswers(prev => {
                    let newAllergies = id === 'none' ? ['none'] : prev.allergies.filter(item => item !== 'none');
                    if (id !== 'none') {
                        newAllergies = newAllergies.includes(id) ? newAllergies.filter(item => item !== id) : [...newAllergies, id];
                    }
                    return { ...prev, allergies: newAllergies };
                });
            };

            const handleSelect = (field, value) => {
                setAnswers(prev => ({ ...prev, [field]: value }));
                nextStep();
            };

            const getResult = () => {
                const { goal, regularity, medical, allergies, allergyType, birthControl } = answers;
                const coreSeeds = ['flax', 'pumpkin', 'sesame', 'sunflower'];
                const hasCoreAllergy = allergies.some(a => coreSeeds.includes(a));
                
                // PRIORITY 1: Core Allergy + Acute
                if (hasCoreAllergy && allergyType === 'acute') return 'ALLERGY_FORBIDDEN';
                
                // PRIORITY 2: Endo, Cyst, Fibroids
                if (medical.some(m => ['endo', 'cysts', 'fibroids'].includes(m))) return 'ENDO_SPECIAL';
                
                // PRIORITY 3: Irregular OR PCOS OR Weight Loss
                if (regularity === 'irregular' || goal.includes('pcos') || goal.includes('weight_loss')) return 'PCOS_MOON';
                
                // PRIORITY 4: Prep Pregnancy Goal
                if (goal.includes('pregnancy')) return 'PREP_PREGNANCY';
                
                // PRIORITY 5: Birth Control Usage or Plan to stop
                if (birthControl === 'pill' || birthControl === 'stop_soon') return 'BIRTH_CONTROL_BRIDGE';
                
                // PRIORITY 6: Default / Standard
                return 'STANDARD_PMS';
            };

            const submitToGoogleSheets = async () => {
                const webAppUrl = "https://script.google.com/macros/s/AKfycbwf_m5AdGhPjTYJ6PmKE75_EKrbi3LHu8NDdNZ7FJ2BRVNLXd6brLshtgzvM4z4DzIziA/exec";
                const result = getResult();
                
                const payload = {
                    nickname: answers.nickname,
                    goals: answers.goal.join(', '),
                    regularity: answers.regularity,
                    medical_conditions: answers.medical.join(', '),
                    allergies: answers.allergies.join(', '),
                    allergy_type: answers.allergyType,
                    is_pregnant: answers.pregnancy,
                    birth_control: answers.birthControl,
                    seriousness_score: answers.seriousness,
                    phone: answers.contactInfo.phone,
                    preferred_time: answers.contactInfo.timeSlot,
                    calculated_result: result
                };

                try {
                    await fetch(webAppUrl, {
                        method: "POST",
                        mode: "no-cors", 
                        headers: { "Content-Type": "text/plain" },
                        body: JSON.stringify(payload)
                    });
                } catch (err) { console.error("Sheet Sync Error:", err); }
            };

            const handleFinalSubmit = () => {
                submitToGoogleSheets();
                nextStep();
            };

            const resultKey = getResult();

            const ResultDisplay = () => {
                const results = {
                    ALLERGY_FORBIDDEN: {
                        title: "โอบกอดความปลอดภัยก่อนนะคะ ⚠️",
                        description: "แอดมินตรวจเช็กแล้ว พบว่าคุณลูกค้ามีอาการ แพ้เมล็ดพืชหลักแบบเฉียบพลัน ซึ่งความปลอดภัยสำคัญที่สุดสำหรับ Meraki ค่ะ",
                        instruction: "แนะนำให้ปรึกษาแพทย์ และไม่แนะนำให้ทานเด็ดขาดค่ะ",
                        color: "text-rose-700",
                        bg: "bg-rose-50",
                        hideCTA: true
                    },
                    ENDO_SPECIAL: {
                        title: "สูตรพิเศษสำหรับสาวที่ Sensitive กับ ฮอร์โมน Estrogen 🌸",
                        description: "สำหรับกลุ่ม Endo/Cyst เราเน้นการลดอักเสบและปรับ Estrogen ที่เด่นเกินไปให้สมดุลค่ะ",
                        instruction: "เน้นลดอักเสบ ปรับ Estrogen ทานเฉพาะ ถุง 2 ตลอด 28 วัน พร้อมงดนมวัว/ของทอด",
                        package: "Set B (2+2) For Endo Care",
                        image: "Set B.jpg",
                        price: "1,790.-",
                        copyMsg: "สนใจ Set B (2+2) ค่ะ ประเมินแล้วเป็นกลุ่ม Endo/Cyst"
                    },
                    PCOS_MOON: {
                        title: "ปรับจังหวะตามรอบพระจันทร์ 🌙",
                        description: "เราจะใช้จังหวะ New Moon เป็นตัวกำหนดให้ฮอร์โมนเริ่มทำงานใหม่ เพื่อให้การตกไข่กลับมาสม่ำเสมอค่ะ",
                        instruction: "ใช้รอบ New Moon กำหนดการเริ่มทานถุง 1 เพื่อให้ฮอร์โมนเริ่มใหม่และตกไข่สม่ำเสมอ",
                        package: "Set A (1+2) PCOS/Weight Care",
                        image: "Set A.jpg",
                        price: "1,790.-",
                        copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วอยู่ในกลุ่ม PCOS/ลดน้ำหนักยาก"
                    },
                    PREP_PREGNANCY: {
                        title: "เตรียมบ้านที่อุ่นและสมบูรณ์ที่สุด 👶🏻",
                        description: "เน้นบำรุงคุณภาพไข่และผนังมดลูกให้นุ่มอุ่น พร้อมสำหรับการฝังตัวของเบบี๋ค่ะ",
                        instruction: "บำรุงคุณภาพไข่และผนังมดลูก ทานสลับถุง 1 และ 2 อย่างละ 14 วัน เริ่มวันแรกที่มีเมนส์",
                        package: "Set A (1+2) Prep Pregnancy",
                        image: "Set A.jpg",
                        price: "1,790.-",
                        copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วเตรียมพร้อมมีเบบี๋"
                    },
                    BIRTH_CONTROL_BRIDGE: {
                        title: "สะพานเชื่อมสู่ฮอร์โมนธรรมชาติ 🌿",
                        description: "ในช่วงเปลี่ยนผ่านร่างกายต้องการเวลาขับฮอร์โมนสังเคราะห์ ฟื้นฟู และเสริมสารอาหารอย่างเต็มที่ค่ะ",
                        instruction: "เน้นการขับฮอร์โมนสังเคราะห์และฟื้นฟูร่างกาย ทานควบคู่ยาคุมได้ทันที",
                        package: "Set A (1+2) Monthly Balance",
                        image: "Set A.jpg",
                        price: "1,790.-",
                        copyMsg: "สนใจ Set A (1+2) ค่ะ ประเมินแล้วอยู่ในกลุ่มใช้ยาคุม/หยุดยา"
                    },
                    STANDARD_PMS: {
                        title: "ให้ทุกวันเป็นวันที่สดใส สบายใจ ✨",
                        description: "บอกลางอแง สิวบุก และอารมณ์เหวี่ยง... ให้ธรรมชาติช่วยประคองฮอร์โมนให้นิ่งสงบนะคะ",
                        instruction: "บอกลางอแง สิวบุก อารมณ์เหวี่ยง ทานสลับถุง 1 และ 2 ตามรอบเดือนปกติ",
                        package: "Set A (1+2) Monthly Balance",
                        image: "Set A.jpg",
                        price: "1,790.-",
                        copyMsg: "สนใจ Set A (1+2) ค่ะ อยากลดอาการ PMS ทั่วไป"
                    }
                };

                const res = results[resultKey];
                const isLatentAllergy = answers.allergies.length > 0 && !answers.allergies.includes('none') && answers.allergyType === 'latent';

                const handleLineCTA = (type) => {
                    const baseUrl = "https://line.me/R/oaMessage/@meraki/?";
                    let msg = "";
                    
                    if (type === 'special') {
                        msg = "สวัสดีค่ะ สนใจรับเซต 3 เดือนดูแลพิเศษ (ผลประเมิน: " + res.copyMsg + ")";
                    } else {
                        msg = "ขอรับเซตทดลอง 1 รอบก่อนค่ะ (ผลประเมิน: " + res.copyMsg + ")";
                    }
                    
                    window.open(`${baseUrl}${encodeURIComponent(msg)}`);
                };

                const formatText = (text) => {
                    if (!text) return "";
                    // Support for underlining if there are any old tags left, but generally just normal text
                    const parts = text.split(/(<u>.*?<\/u>)/);
                    return parts.map((part, i) => {
                        if (part.startsWith('<u>') && part.endsWith('</u>')) return <u key={i} className="underline decoration-red-200 underline-offset-4">{part.slice(3, -4)}</u>;
                        return part;
                    });
                };

                return (
                    <div className="space-y-6 animate-in pb-10">
                        {/* VIP Slot */}
                        {answers.seriousness >= 9 && answers.contactInfo.phone && (
                            <div className="p-5 bg-[#ECFDF5] rounded-[2rem] border border-green-200 shadow-sm mx-[-0.5rem] sm:mx-0">
                                <div className="flex items-center gap-2 mb-1">
                                    <Icon name="PhoneCall" className="w-4 h-4 text-green-500" />
                                    <p className="text-[10px] text-green-600 font-bold uppercase tracking-widest">VIP Consultation Slot</p>
                                </div>
                                <p className="text-xs text-green-800 font-medium">แอดมินจะติดต่อกลับที่เบอร์ <span className="font-bold underline">{answers.contactInfo.phone}</span> นะคะ</p>
                            </div>
                        )}

                        <div className={`p-5 sm:p-6 rounded-[2rem] sm:rounded-[2.5rem] ${res.bg || 'bg-[#FDFBF7]'} border border-red-100 shadow-sm mx-[-0.5rem] sm:mx-0`}>
                            {/* ALLERGY WARNING - TOP PRIORITY */}
                            {isLatentAllergy && !res.hideCTA && (
                                <div className="bg-yellow-50 p-4 rounded-3xl border border-yellow-100 flex gap-3 mb-6 animate-in">
                                    <Icon name="AlertTriangle" className="text-yellow-600 shrink-0 mt-0.5" />
                                    <div>
                                        <h4 className="text-[11px] font-bold text-yellow-800 uppercase tracking-wider mb-1">คำเตือนเรื่องการแพ้เมล็ดพืช</h4>
                                        <p className="text-[11px] text-yellow-800 leading-relaxed font-medium">
                                            เนื่องจากคุณลูกค้ามีอาการ <strong className="text-[#A51D24]">แพ้แบบเล็กน้อยหรือภูมิแฝง</strong> แนะนำให้ <strong className="text-[#A51D24]">ปรึกษาแพทย์ผู้เชี่ยวชาญก่อนเริ่มรับประทาน</strong> หรือเริ่มต้นทดลองในปริมาณที่น้อยที่สุดเพื่อสังเกตอาการอย่างใกล้ชิดนะคะ
                                        </p>
                                    </div>
                                </div>
                            )}

                            <div className="flex justify-between items-start mb-4">
                                <h2 className={`text-xl font-bold ${res.color || 'text-[#A51D24]'} leading-tight pr-4`}>{res.title}</h2>
                                <Icon name="Sparkles" className="text-[#A51D24] shrink-0" />
                            </div>
                            
                            <div className="text-gray-700 mb-6 leading-relaxed font-medium text-sm">
                                {answers.nickname && <span className="block mb-1 font-bold text-gray-900 text-base">คุณ {answers.nickname} คะ...</span>}
                                {formatText(res.description)}
                            </div>

                            <div className="space-y-4">
                                {res.instruction && (
                                    <div className="bg-white/70 p-4 rounded-3xl border border-red-50">
                                        <h3 className="font-bold text-[#A51D24] mb-1 flex items-center gap-2 text-[10px] uppercase tracking-wider"><Icon name="Target" className="w-3 h-3" /> แนวทางการดูแล</h3>
                                        <p className="text-sm text-gray-800 leading-relaxed font-bold">{formatText(res.instruction)}</p>
                                    </div>
                                )}

                                {!res.hideCTA && (
                                    <div className="bg-white rounded-[2rem] p-3 shadow-sm border border-red-50">
                                        <div className="w-full aspect-square bg-gray-50 rounded-[1.5rem] overflow-hidden mb-3 flex items-center justify-center border border-gray-50">
                                            <img src={res.image} alt={res.package} className="w-full h-full object-cover" onError={(e) => {
                                                e.target.style.display = 'none';
                                                e.target.parentElement.innerHTML = `<div class="text-gray-300 italic text-[10px]">${res.image}</div>`;
                                            }} />
                                        </div>
                                        <div className="px-1">
                                            <h4 className="font-bold text-gray-900 text-sm">{res.package}</h4>
                                            <div className="flex items-end justify-between mt-2">
                                                <div className="flex flex-col">
                                                    <span className="text-xl font-black text-[#A51D24] leading-none">{res.price}</span>
                                                    <span className="text-[9px] text-gray-400 uppercase tracking-tighter mt-1">/ รอบเดือน (1 Set)</span>
                                                </div>
                                                <div className="bg-red-50 px-3 py-1 rounded-xl">
                                                    <p className="text-[10px] font-bold text-[#A51D24]">สำหรับ 28 วัน</p>
                                                </div>
                                            </div>
                                        </div>
                                    </div>
                                )}
                            </div>
                        </div>

                        {!res.hideCTA && (
                            <div className="space-y-3 px-1 sm:px-0">
                                <button 
                                    onClick={() => handleLineCTA('special')}
                                    className="w-full bg-[#A51D24] text-white font-bold py-5 rounded-full shadow-lg flex flex-col items-center justify-center transform active:scale-95 transition-all h-[72px]"
                                >
                                    <span className="text-base">รับเซตแนะนำ (ดูแลพิเศษ 3 เดือน) 🌟</span>
                                    <span className="text-[9px] opacity-80 font-normal uppercase tracking-widest">แนะนำสำหรับการเห็นผลที่ยั่งยืน</span>
                                </button>
                                <button 
                                    onClick={() => handleLineCTA('starter')}
                                    className="w-full bg-white border-2 border-[#A51D24] text-[#A51D24] font-bold py-4 rounded-full active:scale-95 transition-all h-[56px]"
                                >
                                    ขอเลือก "เซตเริ่มต้น" 1 รอบก่อนค่ะ
                                </button>
                                <button onClick={resetQuiz} className="w-full py-2 text-gray-400 text-[10px] uppercase tracking-widest flex items-center justify-center gap-2 mt-2">
                                    <Icon name="RefreshCw" className="w-3 h-3" /> เริ่มประเมินใหม่
                                </button>
                            </div>
                        )}

                        {res.hideCTA && (
                             <button onClick={resetQuiz} className="w-full bg-[#A51D24] text-white font-bold py-4 rounded-full shadow-lg active:scale-95 transition-all mx-[-0.5rem] sm:mx-0" style={{width: 'calc(100% + 1rem)'}}>
                                เริ่มประเมินใหม่
                             </button>
                        )}
                    </div>
                );
            };

            return (
                <div className="min-h-screen flex flex-col items-center p-4 text-[#2D2D2D] selection:bg-red-50">
                    <div className="w-full max-w-md mt-4 mb-8 text-center animate-in">
                        <img src="meraki main logo.png" alt="MERAKI" className="h-8 mx-auto mb-2 object-contain" />
                        <p className="text-red-400 text-[9px] uppercase tracking-[0.3em] font-normal">Nature is the best medicine</p>
                    </div>

                    <div className="app-container bg-white rounded-[3rem] shadow-2xl shadow-red-900/5 overflow-hidden border border-red-50/50 relative min-h-[520px]">
                        {step > 0 && step < 8 && (
                            <button 
                                onClick={prevStep} 
                                className="absolute top-6 left-6 z-20 w-10 h-10 bg-[#A51D24] border-none rounded-full flex items-center justify-center text-white shadow-md active:scale-90 transition-transform"
                                title="ย้อนกลับ"
                            >
                                <Icon name="ChevronLeft" className="w-5 h-5" />
                            </button>
                        )}

                        <div className="p-8 md:p-10 pt-14">
                            {step === 0 && (
                                <div className="text-center space-y-8 animate-in">
                                    <div className="w-20 h-20 bg-red-50 rounded-full mx-auto flex items-center justify-center">
                                        <Icon name="Heart" className="w-10 h-10 text-[#A51D24]" fill="#A51D241A" />
                                    </div>
                                    <div className="space-y-3">
                                        <h2 className="text-3xl font-bold text-gray-900 leading-tight">สวัสดีค่ะ<br/><span className="text-[#A51D24]">Sis</span></h2>
                                        <p className="text-gray-600 font-medium text-sm leading-relaxed px-4">
                                            แอดมินชวนมาประเมินสุขภาพ<br/>เพื่อเลือกสิ่งที่ดีที่สุดให้ร่างกายกันค่ะ
                                        </p>
                                    </div>
                                    <div className="space-y-2">
                                        <p className="text-[10px] text-gray-400 uppercase tracking-widest italic font-normal">ขอทราบชื่อเล่นหน่อยนะคะ</p>
                                        <input 
                                            type="text" 
                                            placeholder="ชื่อเล่นของคุณ..." 
                                            value={answers.nickname}
                                            onChange={(e) => setAnswers({...answers, nickname: e.target.value})}
                                            className="w-full p-5 rounded-2xl bg-gray-50 border-none focus:ring-2 focus:ring-red-100 text-center font-bold text-lg transition-all outline-none"
                                        />
                                    </div>
                                    <button 
                                        onClick={nextStep} 
                                        disabled={!answers.nickname.trim()}
                                        className={`w-full font-bold py-6 rounded-full shadow-xl flex items-center justify-center gap-2 text-lg active:scale-95 transition-all ${answers.nickname.trim() ? 'bg-[#A51D24] text-white' : 'bg-gray-100 text-gray-300'}`}
                                    >
                                        เริ่มประเมิน <Icon name="ChevronRight" />
                                    </button>
                                </div>
                            )}

                            {step === 1 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight text-center">เป้าหมายที่คุณ<br/><span className="text-[#A51D24]">ต้องการจัดการ</span></h2>
                                    <div className="grid grid-cols-1 gap-2.5">
                                        {Object.entries(GOAL_LABELS).map(([id, label]) => (
                                            <button key={id} onClick={() => toggleGoal(id)} 
                                                className={`text-left p-5 rounded-2xl border transition-all text-sm font-medium flex items-center justify-between group ${answers.goal.includes(id) ? 'border-[#A51D24] bg-red-50 text-[#A51D24]' : 'border-gray-100 bg-gray-50/50'}`}>
                                                <span className="pr-2">{label}</span> 
                                                {answers.goal.includes(id) && <Icon name="Check" className="w-4 h-4 shrink-0" />}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={nextStep} disabled={answers.goal.length === 0} className={`w-full py-5 rounded-full font-bold shadow-lg transition-all ${answers.goal.length > 0 ? 'bg-[#A51D24] text-white' : 'bg-gray-100 text-gray-300'}`}>ถัดไป</button>
                                </div>
                            )}

                            {step === 2 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight text-center">รอบประจำเดือนของคุณ<br/><span className="text-[#A51D24]">เป็นอย่างไรคะ?</span></h2>
                                    <div className="grid grid-cols-1 gap-3">
                                        {[
                                            { id: 'regular', label: 'มาสม่ำเสมอ ปกติ' }, 
                                            { id: 'irregular', label: 'มาไม่ปกติ / ขาดหาย' }, 
                                            { id: 'none', label: 'เข้าสู่วัยหมดประจำเดือน' }
                                        ].map(opt => (
                                            <button key={opt.id} onClick={() => setAnswers(prev => ({ ...prev, regularity: opt.id }))} 
                                                className={`text-left p-6 rounded-2xl border transition-all text-sm font-medium flex items-center justify-between group ${answers.regularity === opt.id ? 'border-[#A51D24] bg-red-50 text-[#A51D24]' : 'border-gray-100 bg-gray-50/50'}`}>
                                                <span>{opt.label}</span> 
                                                {answers.regularity === opt.id ? <Icon name="Check" className="w-4 h-4" /> : <Icon name="ChevronRight" className="w-4 h-4 text-gray-300" />}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={nextStep} disabled={!answers.regularity} className={`w-full py-5 rounded-full font-bold shadow-lg transition-all ${answers.regularity ? 'bg-[#A51D24] text-white' : 'bg-gray-100 text-gray-300'}`}>ถัดไป</button>
                                </div>
                            )}

                            {step === 3 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight text-center">คุณมีภาวะสุขภาพ<br/><span className="text-[#A51D24]">เหล่านี้หรือไม่?</span></h2>
                                    <div className="grid grid-cols-1 gap-2.5">
                                        {[
                                            { id: 'endo', label: 'เยื่อบุมดลูกเจริญผิดที่' }, { id: 'cysts', label: 'ช็อกโกแลตซีสต์' }, { id: 'fibroids', label: 'เนื้องอกในมดลูก' }, 
                                            { id: 'cancer', label: 'มะเร็งที่ไวต่อฮอร์โมน' }, { id: 'warfarin', label: 'ทานยาละลายลิ่มเลือด' }, { id: 'none', label: 'ไม่มีภาวะข้างต้น' }
                                        ].map(opt => (
                                            <button key={opt.id} onClick={() => toggleMedical(opt.id)}
                                                className={`text-left p-5 rounded-2xl border transition-all flex justify-between items-center text-sm font-medium ${answers.medical.includes(opt.id) ? 'border-[#A51D24] bg-red-50 text-[#A51D24]' : 'border-gray-100 bg-gray-50/50'}`}>
                                                <span>{opt.label}</span> {answers.medical.includes(opt.id) && <Icon name="Check" className="w-4 h-4 shrink-0" />}
                                            </button>
                                        ))}
                                    </div>
                                    <button onClick={nextStep} disabled={answers.medical.length === 0} className="w-full py-5 rounded-full font-bold shadow-lg bg-[#A51D24] text-white">ถัดไป</button>
                                </div>
                            )}

                            {step === 4 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight text-center">ประวัติการแพ้เมล็ดพืช</h2>
                                    <div className="space-y-5">
                                        <div className="grid grid-cols-1 gap-2">
                                            {[
                                                { id: 'flax', label: 'แพ้เมล็ดแฟลกซ์' }, { id: 'pumpkin', label: 'แพ้เมล็ดฟักทอง' },
                                                { id: 'sesame', label: 'แพ้เมล็ดงา' }, { id: 'sunflower', label: 'แพ้เมล็ดทานตะวัน' },
                                                { id: 'other_nuts_grains', label: 'แพ้ถั่วหรือธัญพืชอื่นๆ' },
                                                { id: 'none', label: 'ไม่แพ้เมล็ดพืชค่ะ' }
                                            ].map(opt => (
                                                <button key={opt.id} onClick={() => toggleAllergy(opt.id)}
                                                    className={`text-left p-4 rounded-xl border transition-all flex justify-between items-center text-sm font-medium ${answers.allergies.includes(opt.id) ? 'border-[#A51D24] bg-red-50 text-[#A51D24]' : 'border-gray-100 bg-gray-50/50'}`}>
                                                    <span>{opt.label}</span> {answers.allergies.includes(opt.id) && <Icon name="Check" className="w-4 h-4 shrink-0" />}
                                                </button>
                                            ))}
                                        </div>

                                        {answers.allergies.length > 0 && !answers.allergies.includes('none') && (
                                            <div className="p-5 bg-white rounded-3xl border border-red-50 shadow-sm animate-in">
                                                <p className="text-[10px] text-gray-400 font-bold uppercase tracking-widest text-center mb-3">ระดับความรุนแรงของการแพ้</p>
                                                <div className="flex gap-2">
                                                    <button onClick={() => setAnswers({...answers, allergyType: 'acute'})} className={`flex-1 py-3 rounded-xl text-xs font-bold border transition-all ${answers.allergyType === 'acute' ? 'bg-[#A51D24] text-white' : 'bg-white text-gray-400 border-gray-100'}`}>แพ้รุนแรง/เฉียบพลัน</button>
                                                    <button onClick={() => setAnswers({...answers, allergyType: 'latent'})} className={`flex-1 py-3 rounded-xl text-xs font-bold border transition-all ${answers.allergyType === 'latent' ? 'bg-[#A51D24] text-white' : 'bg-white text-gray-400 border-gray-100'}`}>แพ้เล็กน้อย/ภูมิแฝง</button>
                                                </div>
                                            </div>
                                        )}

                                        <div className="pt-4 border-t border-gray-50">
                                            <p className="text-[10px] text-gray-400 mb-3 font-bold uppercase text-center tracking-widest italic">ตั้งครรภ์/ให้นมบุตร?</p>
                                            <div className="flex gap-2">
                                                {['yes', 'no'].map(v => (
                                                    <button key={v} onClick={() => setAnswers({...answers, pregnancy: v})} className={`flex-1 py-4 rounded-xl border font-bold text-sm transition-all ${answers.pregnancy === v ? 'bg-[#A51D24] text-white border-[#A51D24]' : 'bg-gray-50 text-gray-400 border-transparent'}`}>{v === 'yes' ? 'ใช่' : 'ไม่'}</button>
                                                ))}
                                            </div>
                                        </div>
                                    </div>
                                    <button onClick={nextStep} disabled={answers.allergies.length === 0 || !answers.pregnancy} className={`w-full py-5 rounded-full font-bold shadow-lg transition-all ${answers.allergies.length > 0 && answers.pregnancy ? 'bg-[#A51D24] text-white' : 'bg-gray-100 text-gray-300'}`}>ถัดไป</button>
                                </div>
                            )}

                            {step === 5 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight text-center">การใช้ยาคุมกำเนิด</h2>
                                    <div className="grid grid-cols-1 gap-3">
                                        {[ 
                                            { id: 'pill', label: 'ทาน/ฉีด/ฝัง ยาคุม' }, 
                                            { id: 'stop_soon', label: 'แพลนจะหยุดยาคุมเร็วๆ นี้' }, 
                                            { id: 'none', label: 'ไม่ได้ใช้ยาคุมค่ะ' } 
                                        ].map(opt => (
                                            <button key={opt.id} onClick={() => handleSelect('birthControl', opt.id)} className="text-left p-6 rounded-2xl border border-gray-100 bg-gray-50/50 hover:border-red-100 transition-all text-sm font-medium flex items-center justify-between group">
                                                <span>{opt.label}</span> <Icon name="ChevronRight" className="w-4 h-4 text-gray-300" />
                                            </button>
                                        ))}
                                    </div>
                                </div>
                            )}

                            {step === 6 && (
                                <div className="space-y-8 animate-in text-center pt-4">
                                    <h2 className="text-xl font-bold text-gray-900 leading-tight">คุณจริงจังกับการจัดการ<br/><span className="text-[#A51D24]">ปัญหานี้แค่ไหนคะ?</span></h2>
                                    <div className="py-8">
                                        <input type="range" min="1" max="10" step="1" value={answers.seriousness} onChange={(e) => setAnswers({...answers, seriousness: parseInt(e.target.value)})}
                                            className="w-full h-2 bg-red-50 rounded-lg appearance-none cursor-pointer accent-[#A51D24]" />
                                        <div className="flex justify-between mt-4 text-[10px] text-gray-400 font-bold uppercase tracking-widest"><span>1 - สบายๆ</span><span>10 - ทันที</span></div>
                                        <div className="mt-8 text-7xl font-black text-[#A51D24] opacity-10">{answers.seriousness}</div>
                                    </div>
                                    <button onClick={nextStep} className="w-full bg-[#A51D24] text-white font-bold py-6 rounded-full shadow-xl">ถัดไป</button>
                                </div>
                            )}

                            {step === 7 && (
                                <div className="space-y-6 animate-in pt-4">
                                    <div className="text-center space-y-4">
                                        <div className="w-20 h-20 bg-red-50 rounded-full mx-auto flex items-center justify-center"><Icon name="Check" className="text-[#A51D24] w-10 h-10" /></div>
                                        <h2 className="text-2xl font-bold text-gray-900">บันทึกข้อมูลเรียบร้อย</h2>
                                        <p className="text-gray-500 text-sm">เรากำลังสรุปเซตที่เหมาะสมที่สุดให้คุณค่ะ</p>
                                    </div>
                                    
                                    {answers.seriousness >= 9 && (
                                        <div className="bg-gray-50/50 p-6 rounded-3xl space-y-4 border border-gray-50">
                                            <p className="text-[10px] text-gray-400 uppercase font-bold text-center tracking-widest italic">ระบุเบอร์ติดต่อ (สำหรับปรึกษาฟรี)</p>
                                            <input 
                                                type="tel" placeholder="0xxxxxxxxx" maxLength="10"
                                                value={answers.contactInfo.phone} 
                                                onChange={(e) => setAnswers({...answers, contactInfo: {...answers.contactInfo, phone: e.target.value.replace(/\D/g, '')}})}
                                                className="w-full p-4 rounded-xl border-none text-center font-bold text-2xl tracking-widest shadow-inner focus:ring-1 focus:ring-red-100 outline-none" 
                                            />
                                            <div className="grid grid-cols-2 gap-2">
                                                {['อังคาร 10:00-11:00', 'เสาร์ 10:00-11:00'].map(slot => (
                                                    <button key={slot} onClick={() => setAnswers({...answers, contactInfo: {...answers.contactInfo, timeSlot: slot}})}
                                                        className={`p-3 rounded-xl text-[10px] sm:text-[11px] font-bold border transition-all ${answers.contactInfo.timeSlot === slot ? 'bg-[#A51D24] text-white' : 'bg-white text-gray-400 border-gray-100'}`}>{slot}</button>
                                                ))}
                                            </div>
                                        </div>
                                    )}

                                    <button 
                                        onClick={handleFinalSubmit} 
                                        disabled={answers.seriousness >= 9 && (!answers.contactInfo.phone || !answers.contactInfo.timeSlot)}
                                        className={`w-full font-bold py-6 rounded-full shadow-xl transition-all ${ (answers.seriousness < 9 || (answers.contactInfo.phone && answers.contactInfo.timeSlot)) ? 'bg-[#A51D24] text-white' : 'bg-gray-100 text-gray-300' }`}
                                    >
                                        ดูผลการประเมิน
                                    </button>
                                </div>
                            )}

                            {step === 8 && <ResultDisplay />}
                        </div>
                    </div>
                    
                    <div className="w-full max-w-md text-center py-6 px-6 space-y-2 opacity-80">
                         <p className="text-[10px] text-gray-500 leading-relaxed font-medium">
                            *ข้อความเหล่านี้ยังไม่ได้รับการประเมินโดยสำนักงานคณะกรรมการอาหารและยา ผลิตภัณฑ์นี้ไม่ได้มีวัตถุประสงค์เพื่อวินิจฉัย บำบัด รักษา หรือป้องกันโรคใดๆ
                        </p>
                        <p className="text-[9px] text-gray-400 font-normal leading-relaxed italic">
                            "This statement has not been evaluated by the Food and Drug Administration. This product is not intended to diagnose, treat, cure, or prevent any disease."
                        </p>
                    </div>
                </div>
            );
        };

        const initApp = () => {
            const container = document.getElementById('root');
            if (container && window.ReactDOM) {
                const root = window.ReactDOM.createRoot(container);
                root.render(<App />);
            } else {
                setTimeout(initApp, 100);
            }
        };

        if (document.readyState === 'loading') {
            document.addEventListener('DOMContentLoaded', initApp);
        } else {
            initApp();
        }
    </script>
</body>
</html>
